apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-1
  namespace: lab
  labels:
    app: api-1
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: api-1
  template:
    metadata:
      labels:
        app: api-1
    spec:
      containers:
      - name: api-1
        image: iagouvea/api-1:1.0
        ports:
        - containerPort: 5000